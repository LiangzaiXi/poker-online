<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レンジャー</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <style>
        :root {
            --primary-color: #d4af37;
            --bg-color: #1a120c;
            --text-main: #f4e8d1;
            --danger: #a52a2a;
            --shield-color: #4da6ff;
            --poison-color: #32cd32;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', 'Noto Serif JP', serif;
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px black;
            transition: transform 0.1s ease;
        }

        .crosshair-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 3px black;
        }

        #charge-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 3px solid transparent;
            border-top-color: white;
            border-right-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            opacity: 0;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        #combo-counter {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px #000, 0 0 10px var(--primary-color);
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
        }

        #hitmarker {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        #hitmarker::before,
        #hitmarker::after {
            content: '';
            position: absolute;
            background: #fff;
            box-shadow: 0 0 5px #000;
        }

        #hitmarker::before {
            top: 14px;
            left: -5px;
            width: 40px;
            height: 2px;
            transform: rotate(45deg);
        }

        #hitmarker::after {
            top: 14px;
            left: -5px;
            width: 40px;
            height: 2px;
            transform: rotate(-45deg);
        }

        .hit-active {
            animation: hitAnim 0.3s ease-out;
        }

        @keyframes hitAnim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        #hud {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            color: var(--text-main);
            text-shadow: 1px 1px 2px #000;
        }

        .hud-stats {
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .gold-text {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 24px;
        }

        #health-bar-container {
            width: 300px;
            height: 25px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #555;
            border-radius: 3px;
            position: relative;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #a52a2a, #ff4040);
            transition: width 0.2s ease;
            position: absolute;
            left: 0;
            top: 0;
        }

        #shield-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1e90ff, #4da6ff);
            transition: width 0.2s ease;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0.8;
        }

        #wave-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            text-shadow: 2px 2px 5px #000;
        }

        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(139, 0, 0, 0.6) 100%);
            opacity: 0;
            transition: opacity 0.1s;
        }

        #effect-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .weapon-slot {
            padding: 8px 12px;
            border: 2px solid #555;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 4px;
            opacity: 0.6;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .weapon-slot.active {
            border-color: var(--primary-color);
            opacity: 1;
            color: var(--primary-color);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        #skill-hud {
            display: flex;
            gap: 15px;
            margin-right: 20px;
        }

        .skill-slot {
            width: 60px;
            height: 60px;
            border: 2px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 5px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .skill-key {
            position: absolute;
            top: 2px;
            left: 4px;
            color: var(--primary-color);
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
        }

        .skill-cd-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: rgba(0, 0, 0, 0.7);
            transition: height 0.1s linear;
        }

        .skill-cd-text {
            position: absolute;
            font-size: 24px;
            color: white;
            text-shadow: 1px 1px 2px #000;
            z-index: 2;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
        }

        .menu-panel {
            background: var(--bg-color);
            border: 4px solid var(--primary-color);
            border-radius: 8px;
            padding: 30px;
            color: var(--text-main);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            width: 95%;
            text-align: center;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .menu-panel h1 {
            color: var(--primary-color);
            font-size: 42px;
            margin-top: 0;
            text-shadow: 2px 2px 4px #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .shop-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 15px;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            text-shadow: 0 0 5px var(--primary-color);
        }

        .tab-btn:hover {
            color: #fff;
        }

        .shop-content {
            flex: 1;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #555;
            padding: 12px 0;
        }

        .shop-item:last-child {
            border-bottom: none;
        }

        .item-active {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
        }

        .shop-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(to bottom, #5a3d2b, #3e271a);
            border: 2px solid var(--primary-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .btn:hover:not(:disabled) {
            background: linear-gradient(to bottom, #7a5d4b, #5e473a);
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #777;
            background: #333;
        }

        .floating-damage {
            position: absolute;
            color: #fff;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000, 0 0 5px red;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 5;
        }

        .headshot-text {
            color: #ff3333;
            font-size: 36px;
            text-shadow: 0 0 10px #fff, 0 0 20px red;
            font-style: italic;
            text-transform: uppercase;
        }

        .poison-text {
            color: var(--poison-color);
            font-size: 20px;
            text-shadow: 0 0 5px #000, 0 0 10px var(--poison-color);
        }

        @keyframes floatUp {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -100%) scale(1.5);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -150%) scale(1);
                opacity: 0;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        /* ==========================================
           📱 移动端竖屏强行拦截遮罩
           ========================================== */
        #portrait-lock {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a120c;
            z-index: 999999;
            color: #d4af37;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 24px;
            font-weight: bold;
        }

        @media screen and (max-width: 900px) and (orientation: portrait) {
            #portrait-lock {
                display: flex !important;
            }

            #game-container,
            #ui-layer,
            .menu-overlay {
                display: none !important;
            }
        }

        @media screen and (max-width: 900px) {
            .menu-panel {
                width: 95vw !important;
                max-height: 90vh !important;
                overflow-y: auto !important;
                padding: 15px !important;
            }

            .shop-content {
                max-height: none !important;
                overflow-y: visible !important;
            }
        }
    </style>
</head>

<body>
    <div id="portrait-lock">
        <div style="font-size: 60px; margin-bottom: 20px; animation: rotateAnim 2s infinite;">🔄</div>
        <div>画面を横にしてください</div>
        <style>
            @keyframes rotateAnim {
                0% {
                    transform: rotate(0deg);
                }

                50% {
                    transform: rotate(-90deg);
                }

                100% {
                    transform: rotate(-90deg);
                }
            }
        </style>
    </div>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="mobile-ui"
            style="display: none; position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events: none; z-index: 100;">
            <div id="touch-look-zone"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; touch-action: none; z-index: 1;">
            </div>
            <div id="joystick-zone"
                style="position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; touch-action: none; border: 2px solid rgba(255,255,255,0.3); z-index: 10;">
                <div id="joystick-knob"
                    style="position: absolute; top: 35px; left: 35px; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);">
                </div>
            </div>
            <div
                style="position: absolute; bottom: 0; right: 0; width: 320px; height: 280px; pointer-events: auto; z-index: 10; user-select: none;">
                <div
                    style="position: absolute; top: -60px; right: 20px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end;">
                    <div style="display: flex; gap: 8px;">
                        <button id="mob-btn-w1"
                            style="padding: 8px 12px; border-radius: 6px; background: rgba(0,0,0,0.7); color: #d4af37; border: 1px solid #d4af37; font-weight: bold; font-size: 12px;">近接</button>
                        <button id="mob-btn-w2"
                            style="padding: 8px 12px; border-radius: 6px; background: rgba(0,0,0,0.7); color: #4da6ff; border: 1px solid #4da6ff; font-weight: bold; font-size: 12px;">遠距離</button>
                    </div>
                    <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                        <button id="mob-btn-q"
                            style="width: 45px; height: 45px; border-radius: 8px; background: rgba(255,50,50,0.6); color: white; border: 1px solid white; font-weight: bold; font-size: 12px;">空</button>
                        <button id="mob-btn-e"
                            style="width: 45px; height: 45px; border-radius: 8px; background: rgba(50,255,50,0.6); color: white; border: 1px solid white; font-weight: bold; font-size: 12px;">空</button>
                        <button id="mob-btn-r"
                            style="width: 45px; height: 45px; border-radius: 8px; background: rgba(50,50,255,0.6); color: white; border: 1px solid white; font-weight: bold; font-size: 12px;">空</button>
                    </div>
                </div>
                <div
                    style="position: absolute; bottom: 100px; right: 20px; display: flex; flex-direction: row; align-items: center; gap: 15px;">
                    <button id="mob-btn-atk"
                        style="width: 95px; height: 95px; border-radius: 50%; background: rgba(212, 175, 55, 0.7); color: white; border: 4px solid white; font-size: 20px; font-weight: bold; box-shadow: 0 0 15px rgba(212, 175, 55, 0.9);">攻撃</button>
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                        <button id="mob-btn-block"
                            style="width: 65px; height: 65px; border-radius: 50%; background: rgba(100,150,255,0.5); color: white; border: 2px solid white; font-size: 13px; font-weight: bold;">ガード</button>
                        <button id="mob-btn-jump"
                            style="width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; border: 2px solid white; font-size: 13px; font-weight: bold;">ジャンプ</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="damage-overlay"></div>
        <div id="effect-overlay"></div>
        <div id="crosshair">
            <div class="crosshair-line" style="top: -12px; left: 1px; width: 2px; height: 10px;"></div>
            <div class="crosshair-line" style="bottom: -12px; left: 1px; width: 2px; height: 10px;"></div>
            <div class="crosshair-line" style="left: -12px; top: 1px; width: 10px; height: 2px;"></div>
            <div class="crosshair-line" style="right: -12px; top: 1px; width: 10px; height: 2px;"></div>
        </div>
        <div id="charge-ring"></div>
        <div id="combo-counter">COMBO x2</div>
        <div id="hitmarker"></div>
        <div id="wave-display">第1ウェーブ</div>
        <div id="hud">
            <div>
                <div class="hud-stats">シールド</div>
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                    <div id="shield-bar"></div>
                </div>
                <div id="weapon-slots-ui" style="display:flex; flex-direction:column; gap:5px; margin-top:15px;">
                    <div style="display:flex; gap:10px;">
                        <div id="ui-slot-1" class="weapon-slot active">[1] 近接</div>
                        <div id="ui-slot-2" class="weapon-slot">[2] 遠距離</div>
                    </div>
                    <div id="wpn-cd-bar-bg"
                        style="width: 220px; height: 6px; background: rgba(0,0,0,0.6); border: 1px solid #555; border-radius: 3px; display: none; position: relative; margin-top: 4px; overflow: visible;">
                        <div id="wpn-cd-bar-fill"
                            style="width: 0%; height: 100%; background: #ffd700; transition: width 0.1s linear;"></div>
                        <span id="wpn-cd-text"
                            style="position: absolute; left: 230px; top: -5px; font-size: 12px; color: #ffd700; font-weight: bold; white-space: nowrap;"></span>
                    </div>
                </div>
            </div>
            <div style="display:flex; align-items: flex-end;">
                <div id="skill-hud">
                    <div class="skill-slot" id="slot-0"><span class="skill-key">Q</span><span class="name">空</span>
                        <div class="skill-cd-overlay"></div>
                        <div class="skill-cd-text"></div>
                    </div>
                    <div class="skill-slot" id="slot-1"><span class="skill-key">E</span><span class="name">空</span>
                        <div class="skill-cd-overlay"></div>
                        <div class="skill-cd-text"></div>
                    </div>
                    <div class="skill-slot" id="slot-2"><span class="skill-key">R</span><span class="name">空</span>
                        <div class="skill-cd-overlay"></div>
                        <div class="skill-cd-text"></div>
                    </div>
                </div>
                <div style="text-align: right;">
                    <div class="hud-stats">ゴールド</div>
                    <div class="gold-text" id="gold-display">0 G</div>
                </div>
            </div>
        </div>
    </div>
    <div id="main-menu" class="menu-overlay" style="display: flex;">
        <div class="menu-panel" style="justify-content: center;">
            <h1>レンジャー</h1>
            <p style="font-size: 18px; color: #ccc; margin-bottom: 20px; line-height: 1.8;">
                [ W A S D ] 移動 | [ Space ] ジャンプ | [ Shift ] ダッシュ | [ 左クリック ] 攻撃<br>
                [ 1 ] 近接武器に切り替え | [ 2 ] 遠距離武器に切り替え<br>
                近接武器：連打で連続攻撃、长押しで滑らかに構えて溜め強攻撃！<br>
                遠距離武器（弓）：长押しで弓を引き、连打で極速ブラインドシュート！<br>
                [ Q, E, R ] スキル発動 (近接と遠距離で効果が異なります)
            </p>
            <button class="btn" id="btn-campaign" style="font-size: 24px; padding: 15px 40px;">キャンペーン開始</button>
            <button class="btn" id="btn-endless"
                style="font-size: 24px; padding: 15px 40px; margin-top: 15px;">エンドレスモード</button>
            <button class="btn" id="btn-reset-save"
                style="font-size: 16px; padding: 10px 20px; margin-top: 30px; background: linear-gradient(to bottom, #8b0000, #5a0000); border-color: #ff4040;">データ初期化</button>
            <button class="btn" id="btn-open-shop"
                style="font-size: 24px; padding: 15px 40px; margin-top: 15px; width: fit-content; align-self: center; background: linear-gradient(to bottom, #3b5a2b, #1a3e1a);">ショップ
                (軍需品売場)</button>
        </div>
    </div>
    <div id="shop-menu" class="menu-overlay">
        <div class="menu-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1 id="shop-title">鍛冶屋＆軍需品売場</h1>
                <p class="gold-text" style="font-size: 28px; margin:0;">ゴールド: <span id="shop-gold">0</span> G</p>
            </div>
            <div class="shop-tabs">
                <button class="tab-btn active" onclick="switchShopTab('weapons_melee')">近接武器</button>
                <button class="tab-btn" onclick="switchShopTab('weapons_ranged')">遠距離武器</button>
                <button class="tab-btn" onclick="switchShopTab('skills')">ツインスキル</button>
                <button class="tab-btn" onclick="switchShopTab('upgrades')">パッシブ強化</button>
            </div>
            <div id="shop-content-area" class="shop-content"></div>
            <div style="margin-top: 15px;">
                <button class="btn" id="btn-continue" style="font-size: 24px; padding: 15px 50px;">戦闘を継続</button>
                <button class="btn" id="btn-menu-return"
                    style="display: none; font-size: 24px; padding: 15px 50px;">メインメニューに戻る</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>

                    enemies.forEach(e => { if (e.group.position.distanceTo(camera.position) < 5.0 && Math.random() < dtRaw * 5) handleEnemyHit(e, getWeaponStats(getActiveWeaponId()).damage * 0.5, e.group.position, false); });
                }
                if (activeEffects.comboMasterTimer > 0) { activeEffects.comboMasterTimer -= dtRaw; if (activeEffects.comboMasterTimer <= 0) uiMap.effectOverlay.style.opacity = 0; }
                if (activeEffects.bulletTime > 0) { activeEffects.bulletTime -= dtRaw; if (activeEffects.bulletTime <= 0) uiMap.effectOverlay.style.opacity = 0; }
                if (activeEffects.berserk > 0) { activeEffects.berserk -= dtRaw; if (activeEffects.berserk <= 0) uiMap.effectOverlay.style.opacity = 0; }
                if (activeEffects.vampire > 0) { activeEffects.vampire -= dtRaw; }
                let cdUpdated = false; for (let i = 0; i < 3; i++) { if (gameState.skillCooldowns[i] > 0) { gameState.skillCooldowns[i] -= dtRaw; if (gameState.skillCooldowns[i] < 0) gameState.skillCooldowns[i] = 0; cdUpdated = true; } }
                for (let i = gameState.arrowRains.length - 1; i >= 0; i--) {
                    let rain = gameState.arrowRains[i]; rain.duration -= dtRaw; rain.tick -= dtRaw;
                    if (rain.tick <= 0) {
                        rain.tick = rain.isMelee ? 0.2 : 0.18;
                        if (rain.isMelee) {
                            const m = new THREE.Mesh(new THREE.ConeGeometry(0.3, 3, 4), matSteelTmpl); const pX = rain.pos.x + (Math.random() - 0.5) * 15, pZ = rain.pos.z + (Math.random() - 0.5) * 15;
                            m.position.set(pX, getTerrainHeight(pX, pZ) - 1, pZ); scene.add(m); particles.push({ mesh: m, v: new THREE.Vector3(0, 5, 0), life: 0.5 });
                            enemies.forEach(e => { if (e.group.position.distanceTo(m.position) < 3.0) handleEnemyHit(e, rain.damage, e.group.position, false); });
                        } else {
                            const m = createArrowMesh(0);
                            const pX = rain.pos.x + (Math.random() - 0.5) * 20.0;
                            const pZ = rain.pos.z + (Math.random() - 0.5) * 20.0;
                            m.position.set(pX, getTerrainHeight(pX, pZ) + 35, pZ);
                            m.quaternion.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
                            scene.add(m);
                            arrows.push({
                                mesh: m,
                                velocity: new THREE.Vector3(0, -60, 0),
                                damage: rain.damage,
                                life: 2.0,
                                explosive: true,
                                pierce: false,
                                hitEnemies: new Set()
                            });
                        }
                    }
                    if (rain.duration <= 0) gameState.arrowRains.splice(i, 1);
                }
                enemies.forEach(e => {
                    if (e.stunTimer === undefined) { e.stunTimer = 0; e.isAttacking = false; e.attackProgress = 0; }
                });
                if (cdUpdated || true) updateHUD();
                gameState.spawnTimer -= dtRaw;
                if (gameState.spawnTimer <= 0) {
                    if (gameState.enemiesToSpawn > 0) {
                        if (enemies.length < 15) {
                            spawnEnemy();
                            gameState.enemiesToSpawn--;
                            gameState.spawnTimer = gameState.mode === 'campaign' ? (1.0 + Math.random() * 2) : (0.4 + Math.random() * 1.2);
                        }
                    }
                }
            }
            if (screenShake > 0) { cameraShakeOffset.set((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake); screenShake *= 0.9; if (screenShake < 0.01) screenShake = 0; }
            else { cameraShakeOffset.set(0, 0, 0); }
            camera.position.add(cameraShakeOffset); renderer.render(scene, camera); camera.position.sub(cameraShakeOffset);
        }
        window.onload = init;
    </script>
